name: Validate PR body

on:
  workflow_call:
    inputs:
      project_number:
        description: Org project number for board check
        type: number
        default: 3
      pr_body:
        description: Pull request body markdown
        type: string
        required: false
        default: ''
      pr_draft:
        description: Whether the pull request is a draft (true/false string)
        type: string
        required: false
        default: 'false'
      pr_author:
        description: Pull request author login
        type: string
        required: false
        default: ''
      pr_labels_json:
        description: JSON array of PR label objects
        type: string
        default: '[]'

permissions:
  pull-requests: read
  issues: read
  contents: read

jobs:
  validate:
    name: PR template check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout org validator
        uses: actions/checkout@v4
        with:
          repository: NyumbanApp/.github
          path: org-github

      - name: Run PR body validator
        env:
          PR_BODY: ${{ inputs.pr_body }}
          PR_DRAFT: ${{ inputs.pr_draft }}
          PR_AUTHOR: ${{ inputs.pr_author }}
          PR_LABELS: ${{ inputs.pr_labels_json }}
          REPO: ${{ github.repository }}
          PROJECT_NUMBER: ${{ inputs.project_number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node org-github/scripts/validate-pr-body.mjs
